name: VPS auto-update

on:
  schedule:
    - cron: "20 23 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Force pull even if digest unchanged
        required: false
        default: false
        type: boolean

concurrency:
  group: vps-auto-update-sub2api
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  auto-update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Known hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          PORT="${VPS_PORT:-58222}"
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Run sub2api auto-update on VPS
        env:
          FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_USER: ${{ secrets.VPS_SSH_USER }}
        run: |
          PORT="${VPS_PORT:-58222}"
          USER="${VPS_USER:-root}"
          FORCE_ENV=""
          if [ "$FORCE" = "true" ] || [ "$FORCE" = "True" ]; then
            FORCE_ENV="FORCE=true"
          fi
          ssh -p "$PORT" \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=10 \
            "${USER}@${VPS_HOST}" \
            "${FORCE_ENV} /usr/local/bin/sub2api-auto-update"
