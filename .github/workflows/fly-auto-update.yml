name: Fly auto-update

on:
  schedule:
    # 23:20 UTC ≈ 次日 06:20 Asia/Bangkok
    - cron: "20 23 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Force deploy even if digest unchanged
        required: false
        default: false
        type: boolean

concurrency:
  group: fly-auto-update-sub2api
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  auto-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP: sub2api-wkwcpg
      IMAGE_REPO: weishaw/sub2api
      IMAGE_TAG: latest
      PLATFORM_OS: linux
      PLATFORM_ARCH: amd64
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FORCE_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && inputs.force }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Check digests and maybe deploy
        run: bash deploy/fly/auto-update.sh
