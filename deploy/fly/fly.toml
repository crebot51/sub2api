app = "sub2api-wkwcpg"
primary_region = "ams"

[build]
  image = "weishaw/sub2api:latest"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "60s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
  cpus = 1

[env]
  SERVER_HOST = "0.0.0.0"
  SERVER_PORT = "8080"
  PORT = "8080"
